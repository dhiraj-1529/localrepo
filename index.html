<!DOCTYPE html>
<html lang="en">
<head>
    <title>First Git Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="styleBody">
    <h1>This is my first GitHub project.</h1><br>
    <p>I will learn it to core.</p>
    <button id="styleButton">Change color</button>
</body>
<script>
    const button = document.getElementById("styleButton");
    const background = document.getElementById("styleBody");
    button.addEventListener("click", () => {
        background.classList.toggle("highlight");
        button.classList.toggle("clickedButton");
    });
</script>
</html>
